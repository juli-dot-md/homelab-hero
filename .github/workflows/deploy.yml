name: Deploy to GitHub Pages

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          # Base path: /repo-name for project pages, / for user/org pages
          # Set VITE_BASE_PATH in repo Settings → Secrets and variables → Actions
          # e.g. /homelab-hero
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH || '/' }}
          # Full URL for share link generation
          # Set VITE_BASE_URL in repo variables, e.g. https://yourname.github.io/homelab-hero
          VITE_BASE_URL: ${{ vars.VITE_BASE_URL || '' }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
