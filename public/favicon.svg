<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background circle -->
  <circle cx="16" cy="16" r="16" fill="#1a1209"/>

  <!-- Shield body -->
  <path d="M16 4 L26 8 L26 18 C26 23 21 27.5 16 29 C11 27.5 6 23 6 18 L6 8 Z"
        fill="#2d1f0e" stroke="#d4a843" stroke-width="1.2"/>

  <!-- Shield inner border -->
  <path d="M16 6.5 L24 10 L24 18 C24 22 20 25.8 16 27.2 C12 25.8 8 22 8 18 L8 10 Z"
        fill="none" stroke="#9a7020" stroke-width="0.6" opacity="0.7"/>

  <!-- Crossed swords -->
  <!-- Sword 1: top-left to bottom-right -->
  <line x1="10" y1="10" x2="22" y2="22" stroke="#d4a843" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Guard 1 -->
  <line x1="8.5" y1="13" x2="13" y2="8.5" stroke="#d4a843" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Sword 2: top-right to bottom-left -->
  <line x1="22" y1="10" x2="10" y2="22" stroke="#d4a843" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Guard 2 -->
  <line x1="23.5" y1="13" x2="19" y2="8.5" stroke="#d4a843" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Center gem -->
  <circle cx="16" cy="16" r="2" fill="#d4a843" opacity="0.9"/>
</svg>
