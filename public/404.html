<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Homelab Hero</title>
    <script>
      // Single-page app GitHub Pages redirect.
      // Saves the full path and redirects to the root so the React app can handle routing.
      sessionStorage.setItem("spa-redirect", window.location.pathname + window.location.search + window.location.hash);
      window.location.replace(window.location.origin + window.location.pathname.split("/").slice(0, 2).join("/") + "/");
    </script>
  </head>
  <body></body>
</html>
